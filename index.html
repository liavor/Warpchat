<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp Chat Pro | Mario Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600&display=swap');

        :root {
            --mario-sky: #5C94FC;
            --mario-brick: #E75926;
            --mario-pipe: #46D32D;
            --mario-pipe-dark: #2A811C;
            --mario-gold: #F8D800;
        }

        body {
            background-color: var(--mario-sky);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        .mario-font { font-family: 'Press Start 2P', cursive; }

        .pixel-border {
            box-shadow: 0 -4px 0 0 black, 0 4px 0 0 black, -4px 0 0 0 black, 4px 0 0 0 black;
        }

        .pixel-btn {
            background-color: var(--mario-brick);
            transition: all 0.1s;
        }

        .pixel-btn:active { transform: translateY(4px); }

        .cloud {
            position: absolute;
            background: white;
            width: 80px; height: 40px;
            border-radius: 20px;
            opacity: 0.8;
            animation: moveClouds linear infinite;
        }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud::after { width: 50px; height: 50px; top: -20px; left: 10px; }
        .cloud::before { width: 40px; height: 40px; top: -10px; right: 10px; }

        @keyframes moveClouds { from { left: -100px; } to { left: 110vw; } }

        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .online-dot {
            width: 10px; height: 10px;
            background: var(--mario-pipe);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--mario-pipe);
        }

        /* Loading Animation */
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Background Decoration -->
    <div class="cloud" style="top: 15%; animation-duration: 35s;"></div>
    <div class="cloud" style="top: 40%; animation-duration: 50s; animation-delay: -10s;"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="z-10 w-full max-w-md">
        <div class="bg-white p-8 pixel-border rounded-lg text-center">
            <h1 class="mario-font text-2xl mb-8 text-black leading-tight">WARP<br><span class="text-red-600">CHAT</span></h1>
            
            <div class="space-y-4 mb-8">
                <div>
                    <input type="text" id="nick-input" placeholder="Nickname..." 
                        class="w-full p-4 bg-gray-100 border-4 border-black focus:outline-none focus:border-red-600 text-lg">
                </div>
                <div>
                    <input type="text" id="room-input" placeholder="Oda Adı..." 
                        class="w-full p-4 bg-gray-100 border-4 border-black focus:outline-none focus:border-green-600 text-lg">
                </div>
            </div>

            <button id="join-btn" class="pixel-btn w-full py-4 text-white mario-font text-sm pixel-border flex items-center justify-center gap-2">
                <span id="btn-text">BORUYA ATLA!</span>
                <div id="btn-loader" class="spinner hidden"></div>
            </button>
        </div>
    </div>

    <!-- Main Chat UI -->
    <div id="chat-screen" class="hidden z-10 w-full max-w-5xl h-[85vh] flex flex-col scale-95 transition-all duration-500">
        <div class="glass-panel rounded-t-3xl p-6 flex justify-between items-center border-b border-white/20">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-yellow-400 rounded-xl flex items-center justify-center pixel-border text-3xl">?</div>
                <div>
                    <h2 id="display-nick" class="mario-font text-sm text-white">OYUNCU</h2>
                    <p id="display-room" class="text-xs text-blue-100 font-bold uppercase">DÜNYA 1-1</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="mute-btn" class="w-14 h-14 flex items-center justify-center bg-white/20 hover:bg-white/30 rounded-2xl border border-white/30 transition-all">
                    <span id="mute-icon" class="text-2xl">🎤</span>
                </button>
                <button onclick="location.reload()" class="w-14 h-14 flex items-center justify-center bg-red-600/80 hover:bg-red-700 rounded-2xl border border-red-400">
                    <span class="text-xl">🏃</span>
                </button>
            </div>
        </div>

        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar: Participants -->
            <div class="w-72 bg-black/40 backdrop-blur-xl p-6 overflow-y-auto border-r border-white/10">
                <h3 class="mario-font text-[10px] text-yellow-400 mb-8 tracking-widest">ÇEVRİMİÇİ</h3>
                <ul id="user-list" class="space-y-6">
                    <!-- Dinamik Liste -->
                </ul>
            </div>

            <!-- Voice Grid -->
            <div class="flex-1 p-8 overflow-y-auto bg-gradient-to-br from-transparent to-black/30">
                <div id="voice-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6">
                    <!-- Ses Kutuları -->
                </div>
                <div id="empty-state" class="h-full flex flex-col items-center justify-center opacity-40">
                    <div class="text-9xl mb-4">🏰</div>
                    <p class="mario-font text-[10px] text-white">Diğer arkadaşlarının girmesi bekleniyor...</p>
                </div>
            </div>
        </div>

        <!-- Ground -->
        <div class="h-10 w-full bg-[#885418] border-t-4 border-black flex overflow-hidden">
            <div class="flex-1 opacity-30" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #000 10px, #000 20px);"></div>
        </div>
    </div>

    <!-- PeerJS Kütüphanesi -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // Global Değişkenler
        let myPeer, myStream, myNick, roomName;
        let isHost = false;
        let peers = {}; // Aktif bağlantıları tutar
        let roomClients = []; // Sadece Host kullanır, kimlerin içeride olduğunu tutar
        let isMuted = false;

        // UI Elementleri
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const joinBtn = document.getElementById('join-btn');
        const userListUI = document.getElementById('user-list');
        const voiceGridUI = document.getElementById('voice-grid');
        const emptyState = document.getElementById('empty-state');
        const muteBtn = document.getElementById('mute-btn');

        joinBtn.onclick = async () => {
            myNick = document.getElementById('nick-input').value.trim();
            const roomInput = document.getElementById('room-input').value.trim();

            if (!myNick || !roomInput) return alert("Nick ve Oda adı şart!");
            
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');

            // Oda ismini temizle ve standart bir formata sok
            roomName = 'warp-room-' + roomInput.toLowerCase().replace(/\s+/g, '-');

            try {
                // Sadece mikrofon izni iste
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                // İlk giren kişi olmayı (Host) dene
                initPeerAsHost();

            } catch (err) {
                alert("Mikrofona erişilemedi! Lütfen izin verin.");
                resetBtn();
            }
        };

        function resetBtn() {
            document.getElementById('btn-text').classList.remove('hidden');
            document.getElementById('btn-loader').classList.add('hidden');
        }

        // --- 1. ADIM: SUNUCU OLMAYI DENEME ---
        function initPeerAsHost() {
            // Oda adını doğrudan kendi Peer ID'si yapmaya çalışır.
            myPeer = new Peer(roomName);

            myPeer.on('open', (id) => {
                // Eğer hata vermeden açıldıysa, bu odayı İLK KURAN KİŞİ sensin!
                isHost = true;
                setupUI();
                listenForClients(); // Diğerlerinin bağlanmasını bekle
            });

            myPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // Oda zaten var! Demek ki başkası kurmuş. Biz istemci olacağız.
                    myPeer.destroy(); // Hatalı bağlantıyı temizle
                    initPeerAsClient(); // Normal kullanıcı olarak bağlan
                } else {
                    alert("Ağ hatası: " + err.message);
                    resetBtn();
                }
            });
        }

        // --- 2. ADIM: NORMAL KULLANICI OLARAK BAĞLANMA ---
        function initPeerAsClient() {
            myPeer = new Peer(); // Rastgele bir ID al

            myPeer.on('open', (id) => {
                isHost = false;
                setupUI();

                // Host'a (Odayı Kurana) "Ben geldim" mesajı at
                const conn = myPeer.connect(roomName);
                
                conn.on('open', () => {
                    conn.send({ type: 'join', id: id, nick: myNick });
                });

                conn.on('data', (data) => {
                    if (data.type === 'peer-list') {
                        // Host bize odadaki diğer kişileri gönderdi. Onları arıyoruz.
                        data.peers.forEach(p => makeCall(p.id, p.nick));
                    }
                });

                // Host'un kendisine direkt ses bağlantısı kur
                makeCall(roomName, "Oda Kurucusu");

                // Odadaki diğer kişilerin beni aramasına izin ver
                listenForCalls();
            });
        }

        // --- 3. ADIM: SUNUCUNUN (HOST) YÖNETİMİ ---
        function listenForClients() {
            listenForCalls(); // Host da aramaları yanıtlamalı

            myPeer.on('connection', (conn) => {
                // Yeni biri odaya girdiğinde data bağlantısı açılır
                conn.on('data', (data) => {
                    if (data.type === 'join') {
                        // Yeni gelene, içerideki diğer kişilerin listesini at
                        conn.send({ type: 'peer-list', peers: roomClients });
                        
                        // İçeridekiler listesine yeni geleni ekle
                        roomClients.push({ id: data.id, nick: data.nick });
                    }
                });
            });
        }

        // --- 4. ADIM: ARAMALARI YAPMA VE YANITLAMA ---
        function listenForCalls() {
            myPeer.on('call', (call) => {
                // Biri beni aradığında mikrofonumu açıp ona gönderiyorum
                call.answer(myStream);
                const callerNick = call.metadata ? call.metadata.nick : "Oyuncu";
                handleStream(call, callerNick);
            });
        }

        function makeCall(peerId, targetNick) {
            // Karşı tarafı ara ve metadata ile kendi adımı gönder
            const call = myPeer.call(peerId, myStream, { metadata: { nick: myNick } });
            handleStream(call, targetNick);
        }

        function handleStream(call, remoteNick) {
            if (peers[call.peer]) return; // Zaten bağlıysam geç
            peers[call.peer] = call;

            call.on('stream', (remoteStream) => {
                // Eğer ses elementi zaten varsa tekrar oluşturma
                if (document.getElementById(`audio-${call.peer}`)) return;

                // Sesi oynatacak gizli element
                const audio = document.createElement('audio');
                audio.id = `audio-${call.peer}`;
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                document.body.appendChild(audio);

                // Arayüze kutusunu ekle
                addVoiceBox(call.peer, remoteNick);
            });

            // Güvenli bağlantı kopması kontrolü
            call.peerConnection.oniceconnectionstatechange = function() {
                if(call.peerConnection.iceConnectionState == 'disconnected' ||
                   call.peerConnection.iceConnectionState == 'failed' ||
                   call.peerConnection.iceConnectionState == 'closed') {
                    removeVoiceBox(call.peer);
                    delete peers[call.peer];
                }
            };

            call.on('close', () => {
                removeVoiceBox(call.peer);
                delete peers[call.peer];
            });
        }

        // --- 5. ADIM: ARAYÜZ (UI) GÜNCELLEMELERİ ---
        function setupUI() {
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            document.getElementById('display-nick').innerText = myNick.toUpperCase() + (isHost ? " (KURUCU)" : "");
            document.getElementById('display-room').innerText = `DÜNYA: ${roomName.replace('warp-room-', '').toUpperCase()}`;
            
            // Kendimi listeye ekle
            addUserToList('self', myNick, true);
        }

        function addVoiceBox(id, nick) {
            emptyState.classList.add('hidden'); // Boş yazısını gizle
            
            // Ses Kutusu
            const box = document.createElement('div');
            box.id = `box-${id}`;
            box.className = "glass-panel p-6 rounded-3xl flex flex-col items-center justify-center gap-4 border-2 border-white/20 animate-bounce-slow";
            box.innerHTML = `
                <div class="text-5xl drop-shadow-lg">🍄</div>
                <div class="mario-font text-[9px] text-white text-center">${nick}</div>
                <div class="flex gap-1">
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full animate-ping"></div>
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full animate-ping" style="animation-delay: 0.3s"></div>
                </div>
            `;
            voiceGridUI.appendChild(box);

            // Yan menüye ekle
            addUserToList(id, nick, false);
        }

        function removeVoiceBox(id) {
            document.getElementById(`audio-${id}`)?.remove();
            document.getElementById(`box-${id}`)?.remove();
            document.getElementById(`li-${id}`)?.remove();
            
            // Eğer kimse kalmadıysa boş yazısını göster
            if(Object.keys(peers).length === 0) {
                emptyState.classList.remove('hidden');
            }
        }

        function addUserToList(id, nick, isMe) {
            if (document.getElementById(`li-${id}`)) return;
            
            const li = document.createElement('li');
            li.id = `li-${id}`;
            li.className = "flex items-center justify-between animate-fade-in";
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-xl">${isMe ? '⭐' : '🍄'}</span>
                    <span class="text-white font-bold text-sm tracking-wide">${nick}</span>
                </div>
                <div class="online-dot"></div>
            `;
            userListUI.appendChild(li);
        }

        // Mikrofon Kontrolü
        muteBtn.onclick = () => {
            isMuted = !isMuted;
            myStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('mute-icon').innerText = isMuted ? '🔇' : '🎤';
            muteBtn.classList.toggle('bg-red-500', isMuted);
            muteBtn.classList.toggle('bg-white/20', !isMuted);
        };
    </script>
</body>
</html>
