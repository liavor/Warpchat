<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warp Chat Pro | Mario Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600&display=swap');

        :root {
            --mario-sky: #5C94FC;
            --mario-brick: #E75926;
            --mario-pipe: #46D32D;
            --mario-pipe-dark: #2A811C;
            --mario-gold: #F8D800;
        }

        body {
            background-color: var(--mario-sky);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        .mario-font { font-family: 'Press Start 2P', cursive; }

        .pixel-border {
            box-shadow: 0 -4px 0 0 black, 0 4px 0 0 black, -4px 0 0 0 black, 4px 0 0 0 black;
        }

        .pixel-btn {
            background-color: var(--mario-brick);
            transition: all 0.1s;
        }

        .pixel-btn:active { transform: translateY(4px); }

        .cloud {
            position: absolute;
            background: white;
            width: 80px; height: 40px;
            border-radius: 20px;
            opacity: 0.8;
            animation: moveClouds linear infinite;
        }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud::after { width: 50px; height: 50px; top: -20px; left: 10px; }
        .cloud::before { width: 40px; height: 40px; top: -10px; right: 10px; }

        @keyframes moveClouds { from { left: -100px; } to { left: 110vw; } }

        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .online-dot {
            width: 10px; height: 10px;
            background: var(--mario-pipe);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--mario-pipe);
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 24px; height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Scrollbar Gizleme/İnceltme */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Arka Plan Bulutları -->
    <div class="cloud" style="top: 15%; animation-duration: 35s;"></div>
    <div class="cloud" style="top: 40%; animation-duration: 50s; animation-delay: -10s;"></div>

    <!-- Giriş Ekranı -->
    <div id="login-screen" class="z-10 w-full max-w-md">
        <div class="bg-white p-8 pixel-border rounded-lg text-center shadow-2xl">
            <h1 class="mario-font text-2xl mb-8 text-black leading-tight">WARP<br><span class="text-red-600">CHAT</span></h1>
            
            <div class="space-y-4 mb-8">
                <div>
                    <input type="text" id="nick-input" placeholder="Nickname..." 
                        class="w-full p-4 bg-gray-100 border-4 border-black focus:outline-none focus:border-red-600 text-lg font-bold">
                </div>
                <div>
                    <input type="text" id="room-input" placeholder="Oda Adı..." 
                        class="w-full p-4 bg-gray-100 border-4 border-black focus:outline-none focus:border-green-600 text-lg font-bold">
                </div>
            </div>

            <button id="join-btn" class="pixel-btn w-full py-4 text-white mario-font text-sm pixel-border flex items-center justify-center gap-2">
                <span id="btn-text">BORUYA ATLA!</span>
                <div id="btn-loader" class="spinner hidden"></div>
            </button>
        </div>
    </div>

    <!-- Ana Uygulama Ekranı -->
    <div id="chat-screen" class="hidden z-10 w-full max-w-6xl h-[90vh] flex flex-col scale-95 transition-all duration-500 shadow-2xl">
        
        <!-- Üst Bar -->
        <div class="glass-panel rounded-t-3xl p-6 flex justify-between items-center border-b border-white/20">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-yellow-400 rounded-xl flex items-center justify-center pixel-border text-3xl">?</div>
                <div>
                    <h2 id="display-nick" class="mario-font text-sm text-white">OYUNCU</h2>
                    <p id="display-room" class="text-xs text-blue-100 font-bold uppercase">DÜNYA 1-1</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="mute-btn" class="w-14 h-14 flex items-center justify-center bg-white/20 hover:bg-white/30 rounded-2xl border border-white/30 transition-all shadow-lg">
                    <span id="mute-icon" class="text-2xl">🎤</span>
                </button>
                <button onclick="location.reload()" class="w-14 h-14 flex items-center justify-center bg-red-600/80 hover:bg-red-700 rounded-2xl border border-red-400 shadow-lg">
                    <span class="text-xl">🏃</span>
                </button>
            </div>
        </div>

        <div class="flex-1 flex overflow-hidden">
            <!-- Sol Menü: Bağlı Kullanıcılar -->
            <div class="w-64 bg-black/40 backdrop-blur-xl p-6 overflow-y-auto border-r border-white/10 hidden md:block">
                <h3 class="mario-font text-[10px] text-yellow-400 mb-8 tracking-widest">ÇEVRİMİÇİ</h3>
                <ul id="user-list" class="space-y-6">
                    <!-- Dinamik Kullanıcı Listesi -->
                </ul>
            </div>

            <!-- Sağ Alan: Ses Izgarası & Yazılı Chat -->
            <div class="flex-1 flex flex-col overflow-hidden bg-gradient-to-br from-transparent to-black/30 relative">
                
                <!-- Sesli Sohbet Izgarası (Üst Kısım) -->
                <div class="flex-1 p-6 overflow-y-auto">
                    <div id="voice-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Ses Kutuları -->
                    </div>
                    <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center opacity-40 pointer-events-none">
                        <div class="text-9xl mb-4">🏰</div>
                        <p class="mario-font text-[10px] text-white">Arkadaşların bekleniyor...</p>
                    </div>
                </div>

                <!-- Yazılı Sohbet Alanı (Minik Alt Kısım) -->
                <div class="h-48 bg-black/50 backdrop-blur-md border-t border-white/10 flex flex-col rounded-br-none md:rounded-br-none">
                    <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-2 font-mono text-sm">
                        <!-- Yazılı mesajlar buraya gelecek -->
                        <div class="text-yellow-400 text-xs text-center opacity-70 mb-2 font-sans italic">Bağlantı kuruldu. Sohbet başlatılabilir.</div>
                    </div>
                    
                    <div class="p-3 bg-black/40 border-t border-white/10 flex gap-2 items-center">
                        <input type="text" id="chat-input" placeholder="Yazmaya başla..." 
                            class="flex-1 bg-white/10 text-white px-4 py-3 rounded-xl focus:outline-none focus:bg-white/20 transition-all font-sans placeholder-white/40 border border-white/10">
                        <button id="chat-send-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl transition-all mario-font text-[10px] pixel-border h-full flex items-center shadow-lg">
                            GÖNDER
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Zemin Dekorasyonu -->
        <div class="h-8 w-full bg-[#885418] border-t-4 border-black flex overflow-hidden rounded-b-3xl">
            <div class="flex-1 opacity-30" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, #000 10px, #000 20px);"></div>
        </div>
    </div>

    <!-- PeerJS WebRTC Kütüphanesi -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // Global Değişkenler
        let myPeer, myStream, myNick, roomName;
        let isHost = false;
        let peers = {}; // Ses bağlantıları
        
        // Data (Yazılı Chat) Bağlantıları
        let hostDataConnections = []; // Host için
        let myHostDataConnection = null; // Client için

        let roomClients = []; 
        let isMuted = false;

        // UI Elementleri
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const joinBtn = document.getElementById('join-btn');
        const userListUI = document.getElementById('user-list');
        const voiceGridUI = document.getElementById('voice-grid');
        const emptyState = document.getElementById('empty-state');
        const muteBtn = document.getElementById('mute-btn');
        const chatInput = document.getElementById('chat-input');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const chatMessages = document.getElementById('chat-messages');

        // GİRİŞ İŞLEMİ
        joinBtn.onclick = async () => {
            myNick = document.getElementById('nick-input').value.trim();
            const roomInput = document.getElementById('room-input').value.trim();

            if (!myNick || !roomInput) return alert("Nick ve Oda adı şart!");
            
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');

            roomName = 'warp-room-' + roomInput.toLowerCase().replace(/\s+/g, '-');

            try {
                myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                initPeerAsHost(); // Önce kurucu olmayı dene
            } catch (err) {
                alert("Mikrofona erişilemedi! Lütfen izin verin.");
                resetBtn();
            }
        };

        function resetBtn() {
            document.getElementById('btn-text').classList.remove('hidden');
            document.getElementById('btn-loader').classList.add('hidden');
        }

        // --- ADIM 1: HOST (KURUCU) MANTIĞI ---
        function initPeerAsHost() {
            myPeer = new Peer(roomName);

            myPeer.on('open', (id) => {
                isHost = true;
                setupUI();
                listenForClients(); 
            });

            myPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // Oda dolu, misafir olarak gir
                    myPeer.destroy();
                    initPeerAsClient();
                } else {
                    alert("Ağ hatası: " + err.message);
                    resetBtn();
                }
            });
        }

        // --- ADIM 2: CLIENT (MİSAFİR) MANTIĞI ---
        function initPeerAsClient() {
            myPeer = new Peer(); 

            myPeer.on('open', (id) => {
                isHost = false;
                setupUI();

                // Host ile veri bağlantısı kur (Yazışma ve Liste için)
                myHostDataConnection = myPeer.connect(roomName);
                
                myHostDataConnection.on('open', () => {
                    myHostDataConnection.send({ type: 'join', id: id, nick: myNick });
                });

                myHostDataConnection.on('data', (data) => {
                    if (data.type === 'peer-list') {
                        // Yeni girdiğimde içeridekileri arıyorum
                        data.peers.forEach(p => makeCall(p.id, p.nick));
                    }
                    if (data.type === 'chat') {
                        // Host'tan gelen yazılı mesajı ekrana yaz
                        appendChatMessage(data.sender, data.text);
                    }
                });

                // Host'un kendisiyle ses bağlantısı kur
                makeCall(roomName, "Oda Kurucusu");
                listenForCalls();
            });
        }

        // --- ADIM 3: HOST VERİ DİNLEYİCİSİ (YAZILI CHAT DAĞITIMI) ---
        function listenForClients() {
            listenForCalls();

            myPeer.on('connection', (conn) => {
                hostDataConnections.push(conn); // Veri kanalını kaydet

                conn.on('data', (data) => {
                    if (data.type === 'join') {
                        // Listeyi yenisine gönder
                        conn.send({ type: 'peer-list', peers: roomClients });
                        roomClients.push({ id: data.id, nick: data.nick });
                    }
                    if (data.type === 'chat') {
                        // Biri mesaj attığında: Kendi ekranıma yazdır ve DİĞER HERKESE dağıt
                        appendChatMessage(data.sender, data.text);
                        broadcastChat(data, conn.peer);
                    }
                });

                conn.on('close', () => {
                    hostDataConnections = hostDataConnections.filter(c => c.peer !== conn.peer);
                    roomClients = roomClients.filter(c => c.id !== conn.peer);
                });
            });
        }

        function broadcastChat(msgData, excludePeerId = null) {
            hostDataConnections.forEach(conn => {
                if (conn.peer !== excludePeerId) {
                    conn.send(msgData);
                }
            });
        }

        // --- ADIM 4: SES BAĞLANTILARI (WebRTC) ---
        function listenForCalls() {
            myPeer.on('call', (call) => {
                call.answer(myStream);
                const callerNick = call.metadata ? call.metadata.nick : "Oyuncu";
                handleStream(call, callerNick);
            });
        }

        function makeCall(peerId, targetNick) {
            const call = myPeer.call(peerId, myStream, { metadata: { nick: myNick } });
            handleStream(call, targetNick);
        }

        function handleStream(call, remoteNick) {
            if (peers[call.peer]) return;
            peers[call.peer] = call;

            call.on('stream', (remoteStream) => {
                if (document.getElementById(`audio-${call.peer}`)) return;
                
                const audio = document.createElement('audio');
                audio.id = `audio-${call.peer}`;
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                document.body.appendChild(audio);

                addVoiceBox(call.peer, remoteNick);
            });

            call.peerConnection.oniceconnectionstatechange = function() {
                if(call.peerConnection.iceConnectionState == 'disconnected' ||
                   call.peerConnection.iceConnectionState == 'failed' ||
                   call.peerConnection.iceConnectionState == 'closed') {
                    removeVoiceBox(call.peer);
                    delete peers[call.peer];
                }
            };

            call.on('close', () => {
                removeVoiceBox(call.peer);
                delete peers[call.peer];
            });
        }

        // --- ADIM 5: YAZILI SOHBET (CHAT) MANTIĞI ---
        function sendChatMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            const msgData = { type: 'chat', sender: myNick, text: text };
            
            // Kendi ekranıma ekle
            appendChatMessage('Sen', text, true);

            // Veriyi yolla
            if (isHost) {
                broadcastChat(msgData); // Host isem herkese dağıt
            } else {
                if (myHostDataConnection && myHostDataConnection.open) {
                    myHostDataConnection.send(msgData); // Client isem Host'a yolla
                }
            }

            chatInput.value = '';
            chatInput.focus();
        }

        function appendChatMessage(sender, text, isMe = false) {
            const div = document.createElement('div');
            div.className = "flex flex-col animate-fade-in";
            
            if (isMe) {
                div.innerHTML = `<div class="bg-blue-600/30 border border-blue-500/50 text-blue-100 self-end px-4 py-2 rounded-2xl rounded-tr-sm max-w-[80%] break-words">
                                    <span class="block text-[10px] text-blue-300 font-bold mb-1 uppercase tracking-wider">SEN</span>
                                    ${text}
                                 </div>`;
            } else {
                div.innerHTML = `<div class="bg-white/10 border border-white/20 text-white self-start px-4 py-2 rounded-2xl rounded-tl-sm max-w-[80%] break-words">
                                    <span class="block text-[10px] text-yellow-400 font-bold mb-1 uppercase tracking-wider">${sender}</span>
                                    ${text}
                                 </div>`;
            }

            chatMessages.appendChild(div);
            // Otomatik en alta kaydır
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Chat Olay Dinleyicileri
        chatSendBtn.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });


        // --- ADIM 6: UI GÜNCELLEMELERİ ---
        function setupUI() {
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');
            document.getElementById('display-nick').innerText = myNick.toUpperCase() + (isHost ? " (KURUCU)" : "");
            document.getElementById('display-room').innerText = `DÜNYA: ${roomName.replace('warp-room-', '').toUpperCase()}`;
            addUserToList('self', myNick, true);
        }

        function addVoiceBox(id, nick) {
            emptyState.classList.add('hidden');
            
            const box = document.createElement('div');
            box.id = `box-${id}`;
            box.className = "glass-panel p-6 rounded-3xl flex flex-col items-center justify-center gap-4 border-2 border-white/20 animate-bounce-slow shadow-lg";
            box.innerHTML = `
                <div class="text-5xl drop-shadow-lg">🍄</div>
                <div class="mario-font text-[9px] text-white text-center">${nick}</div>
                <div class="flex gap-1">
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full animate-ping"></div>
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full animate-ping" style="animation-delay: 0.3s"></div>
                </div>
            `;
            voiceGridUI.appendChild(box);
            addUserToList(id, nick, false);
        }

        function removeVoiceBox(id) {
            document.getElementById(`audio-${id}`)?.remove();
            document.getElementById(`box-${id}`)?.remove();
            document.getElementById(`li-${id}`)?.remove();
            
            if(Object.keys(peers).length === 0) emptyState.classList.remove('hidden');
        }

        function addUserToList(id, nick, isMe) {
            if (document.getElementById(`li-${id}`)) return;
            const li = document.createElement('li');
            li.id = `li-${id}`;
            li.className = "flex items-center justify-between animate-fade-in";
            li.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-xl">${isMe ? '⭐' : '🍄'}</span>
                    <span class="text-white font-bold text-sm tracking-wide">${nick}</span>
                </div>
                <div class="online-dot"></div>
            `;
            userListUI.appendChild(li);
        }

        // Mikrofon Kontrolü
        muteBtn.onclick = () => {
            isMuted = !isMuted;
            myStream.getAudioTracks()[0].enabled = !isMuted;
            document.getElementById('mute-icon').innerText = isMuted ? '🔇' : '🎤';
            muteBtn.classList.toggle('bg-red-500', isMuted);
            muteBtn.classList.toggle('bg-white/20', !isMuted);
        };
    </script>
</body>
</html>
